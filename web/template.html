<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} // Review</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">

    <!-- Style sheets -->
    <link rel="stylesheet" href="/static/app.css">
</head>
<body>
    <!-- Top Toolbar -->
    <div class="toolbar" id="toolbar">
        <div class="toolbar-header">
          <button class="toolbar-toggle-btn content-search-trigger" id="content-search-trigger" type="button" title="Search content" aria-label="Search content">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="11" cy="11" r="7"></circle>
                <path d="m20 20-3.5-3.5"></path>
            </svg>
          </button>
          <button class="toolbar-toggle-btn" id="toolbar-toggle" title="Settings">
            <svg class="icon-settings" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
            <svg class="icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
          <span class="toolbar-title">Settings</span>
          {{ if .AppVersion }}<span class="toolbar-version">{{ .AppVersion }}</span>{{ end }}
        </div>
        <div class="toolbar-content">
            <div class="toolbar-row">
                <div class="toolbar-group toolbar-layout-group" role="group" aria-label="Layout">
                    <span class="toolbar-label">Layout</span>
                    <button class="toolbar-btn" data-layout-mode="compact" aria-pressed="false" title="Compact layout">Compact</button>
                    <button class="toolbar-btn" data-layout-mode="toc-middle" aria-pressed="false" title="Files, TOC, content">TOC Mid</button>
                    <button class="toolbar-btn" data-layout-mode="toc-right" aria-pressed="false" title="Files, content, TOC">TOC Right</button>
                    <button class="toolbar-btn" id="layout-default" title="Use project default layout">Default</button>
                </div>
            </div>
            <div class="toolbar-row">
                <div class="toolbar-group">
                    <span class="toolbar-label">Width</span>
                    <button class="toolbar-btn" data-width="768px">S</button>
                    <button class="toolbar-btn active" data-width="960px">M</button>
                    <button class="toolbar-btn" data-width="1200px">L</button>
                    <button class="toolbar-btn" data-width="100%">Full</button>
                </div>
                <div class="toolbar-divider"></div>
                <div class="toolbar-group">
                    <span class="toolbar-label">Font</span>
                    <button class="toolbar-btn toolbar-icon-btn" id="font-dec" title="Decrease Font">-</button>
                    <button class="toolbar-btn" id="font-reset" title="Reset Font">Reset</button>
                    <button class="toolbar-btn toolbar-icon-btn" id="font-inc" title="Increase Font">+</button>
                </div>
            </div>
            <div class="toolbar-row">
                <div class="toolbar-group">
                    <span class="toolbar-label">Color</span>
                    <select class="toolbar-select" id="color-scheme-select">
                        <option value="system">System</option>
                        <option value="light">Light</option>
                        <option value="dark">Dark</option>
                    </select>
                </div>
                <div class="toolbar-divider"></div>
                <div class="toolbar-group">
                    <span class="toolbar-label">Theme</span>
                    <select class="toolbar-select" id="theme-select">
                        <option value="default">Default</option>
                        <option value="github">GitHub</option>
                        <option value="one-dark">One Dark</option>
                        <option value="dracula">Dracula</option>
                        <option value="nord">Nord</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <div class="app-shell">
        <!-- Sidebar -->
        <aside class="files-pane sidebar" id="files-pane">
            <div class="sidebar-resize-handle" id="sidebar-resize-handle"></div>
            <div class="sidebar-header">
                <!-- Collapsed state: vertical logo + status -->
                <div class="sidebar-collapsed-header">
                    <img src="/static/logo.svg" alt="" class="sidebar-collapsed-logo">
                    <div class="sidebar-collapsed-status"></div>
                </div>
                <!-- Expanded state: horizontal layout -->
                <div class="doc-meta">
                    <div class="brand-lockup" aria-label="MarkView">
                        <img src="/static/logo.svg" alt="" class="brand-logo">
                        <span class="brand-wordmark">MarkView</span>
                    </div>
                    <span class="brand-divider" aria-hidden="true"></span>
                    <div class="doc-status">
                    <div class="live-dot" id="live-dot"></div>
                    <span id="status-text">Live</span>
                    </div>
                </div>
                <button class="sidebar-collapse-btn" id="sidebar-collapse-btn" title="Collapse sidebar" aria-label="Collapse sidebar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
            </div>
            <div class="sidebar-panels">
                <section class="sidebar-panel sidebar-panel-files" id="files-panel">
                    <div class="sidebar-section-title">
                        <span class="sidebar-section-label">
                            <span class="sidebar-section-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                            </span>
                            <span>Files</span>
                        </span>
                        <!-- 文件搜索框 -->
                        <form class="files-search-box" role="search">
                            <label for="files-search-input" class="visually-hidden">搜索文件</label>
                            <input
                                type="text"
                                id="files-search-input"
                                placeholder="Search file..."
                                autocomplete="off"
                            />
                            <button id="files-search-clear" class="search-clear-btn" type="button" aria-label="清除搜索">
                                ×
                            </button>
                        </form>
                        <button class="sidebar-section-collapse-btn" id="files-collapse-btn" title="Collapse Files" aria-label="Collapse Files section">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </button>
                    </div>
                    <div class="sidebar-scroll" id="file-tree"></div>
                </section>
            </div>
            <div class="sidebar-icons" id="sidebar-icons">
                <button class="sidebar-icon-btn" data-panel="files" title="Files">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                </button>
                <button class="sidebar-icon-btn" data-panel="toc" title="Table of Contents">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="20" y2="6"></line><line x1="8" y1="12" x2="20" y2="12"></line><line x1="8" y1="18" x2="20" y2="18"></line><circle cx="4" cy="6" r="1.2" fill="currentColor" stroke="none"></circle><circle cx="4" cy="12" r="1.2" fill="currentColor" stroke="none"></circle><circle cx="4" cy="18" r="1.2" fill="currentColor" stroke="none"></circle></svg>
                </button>
            </div>
        </aside>

        <aside class="toc-pane sidebar-panel sidebar-panel-toc" id="toc-panel">
            <div class="sidebar-section-title">
                <span class="sidebar-section-label">
                    <button class="sidebar-section-icon toc-section-toggle" type="button" aria-controls="toc-panel" aria-expanded="true" aria-label="Toggle table of contents" title="Toggle table of contents">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="20" y2="6"></line><line x1="8" y1="12" x2="20" y2="12"></line><line x1="8" y1="18" x2="20" y2="18"></line><circle cx="4" cy="6" r="1.2" fill="currentColor" stroke="none"></circle><circle cx="4" cy="12" r="1.2" fill="currentColor" stroke="none"></circle><circle cx="4" cy="18" r="1.2" fill="currentColor" stroke="none"></circle></svg>
                    </button>
                    <span class="toc-section-label-text">On This Page</span>
                </span>
            </div>
            <div class="sidebar-scroll toc-container">
                <ul class="toc-list" id="toc-list"></ul>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="content-wrapper">
            <!-- Content Search -->
            <div class="content-search-wrapper" id="content-search" hidden>
                <button class="content-search-backdrop" type="button" aria-label="Close search"></button>
                <section class="content-search-panel" role="dialog" aria-modal="true" aria-label="Search content">
                <div class="content-search-box">
                    <svg class="content-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="11" cy="11" r="7"></circle>
                        <path d="m20 20-3.5-3.5"></path>
                    </svg>
                    <input
                        type="text"
                        class="content-search-input"
                        id="content-search-input"
                        placeholder="Search in files..."
                        autocomplete="off"
                    />
                    <kbd class="content-search-shortcut">Esc</kbd>
                    <button class="content-search-clear" type="button" aria-label="Clear search">×</button>
                </div>
                <div class="content-search-results"></div>
                </section>
            </div>
            <div class="content-inner">
                <!-- inject the tempalte-main.html -->
                {{ .MainContent }}
            </div>
        </main>
    </div>

    <!-- Mermaid Modal -->
    <div id="mermaid-modal" class="mermaid-modal">
        <div class="mermaid-modal-close" onclick="closeMermaidModal()">&times;</div>
        <div id="mermaid-modal-content" class="mermaid-modal-content"></div>
        <aside id="mermaid-source-panel" class="mermaid-source-panel"></aside>
    </div>

    <!-- Image Fullscreen Modal -->
    <div id="image-modal" class="image-modal">
        <button class="image-modal-close" id="image-modal-close">&times;</button>
        <div id="image-modal-content" class="image-modal-content"></div>
    </div>

    <!-- Link Preview Panel -->
    <div id="preview-panel" class="preview-panel" style="display: none;">
        <div class="preview-resize-handle" id="preview-resize-handle" aria-hidden="true"></div>
        <div class="preview-header">
            <button class="preview-close" type="button">×</button>
            <span class="preview-title" id="preview-title"></span>
        </div>
        <div class="preview-content">
            <div class="preview-loading">
                <div class="loading-spinner"></div>
                <span>加载中...</span>
            </div>
            <div class="preview-body"></div>
            <div class="preview-error">
                <span>无法预览此链接</span>
            </div>
        </div>
    </div>

    <!-- Main Application Script -->
    <script id="file-tree-data" type="application/json">{{ .FileTreeJSON }}</script>
    <script id="app-config-data" type="application/json">{{ .AppConfigJSON }}</script>
    <script type="module" src="/static/app.js"></script>
</body>
</html>
