<div class="paper-wrapper">
    <a href="{{ .CurrentFilePath }}?q=raw" class="view-raw-btn" target="_blank" title="在新标签页查看原始 Markdown">
        <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
        </svg>
        <span>查看源码</span>
    </a>
    <article class="paper" id="content">
        {{ .Content }}
    </article>
</div>

<div class="file-meta" id="file-meta">
    <div class="file-meta-line">
        <span><strong>{{ .FileName }}</strong></span>
        <span class="file-meta-sep">•</span>
        <span>{{ .FileSize }}</span>
        <span class="file-meta-sep">•</span>
        <span>创建于 {{ .CreatedAt }}</span>
        <span class="file-meta-sep">•</span>
        <span>更新于 {{ .ModifiedAt }}</span>
    </div>
</div>

<script id="current-file-path-data" type="application/json">{{ .CurrentFilePathJSON }}</script>
